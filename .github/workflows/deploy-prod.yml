name: Deploy Production

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag à déployer (ex: v1.2.0)"
        required: true
        type: string

jobs:
  build-push:
    name: Build & Push images (${{ inputs.tag }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - name: Set lowercase owner
        id: owner
        run: echo "value=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Login to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push server
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/server/Dockerfile
          target: production
          push: true
          tags: |
            ghcr.io/${{ steps.owner.outputs.value }}/oracle-server:latest
            ghcr.io/${{ steps.owner.outputs.value }}/oracle-server:${{ inputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push client
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/client/Dockerfile
          target: production
          push: true
          build-args: |
            VITE_API_URL=${{ secrets.PROD_VITE_API_URL }}
          tags: |
            ghcr.io/${{ steps.owner.outputs.value }}/oracle-client:latest
            ghcr.io/${{ steps.owner.outputs.value }}/oracle-client:${{ inputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to production server
    runs-on: ubuntu-latest
    needs: build-push
    environment: production

    steps:
      - name: Set lowercase owner
        id: owner
        run: echo "value=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: SSH deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          command_timeout: 5m
          timeout: 30s
          script: |
            cd ~/oracle
            TAG=${{ inputs.tag }} DOCKER_REGISTRY=ghcr.io/${{ steps.owner.outputs.value }} docker compose -f docker-compose.prod.yml pull
            TAG=${{ inputs.tag }} DOCKER_REGISTRY=ghcr.io/${{ steps.owner.outputs.value }} docker compose -f docker-compose.prod.yml up -d
