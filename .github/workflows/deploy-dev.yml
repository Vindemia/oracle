name: Deploy Dev

on:
  push:
    branches:
      - develop
    paths-ignore:
      - "**.md"

jobs:
  build-push:
    name: Build & Push images (dev)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - name: Set lowercase owner
        id: owner
        run: echo "value=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Login to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push server
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/server/Dockerfile
          target: production
          push: true
          tags: |
            ghcr.io/${{ steps.owner.outputs.value }}/oracle-server:dev
            ghcr.io/${{ steps.owner.outputs.value }}/oracle-server:dev-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push client
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/client/Dockerfile
          target: production
          push: true
          build-args: |
            VITE_API_URL=${{ secrets.DEV_VITE_API_URL }}
          tags: |
            ghcr.io/${{ steps.owner.outputs.value }}/oracle-client:dev
            ghcr.io/${{ steps.owner.outputs.value }}/oracle-client:dev-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to dev server
    runs-on: ubuntu-latest
    needs: build-push

    steps:
      - name: Set lowercase owner
        id: owner
        run: echo "value=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: SSH deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          command_timeout: 5m
          timeout: 30s
          script: |
            cd ~/oracle-dev
            TAG=dev DOCKER_REGISTRY=ghcr.io/${{ steps.owner.outputs.value }} docker compose -f docker-compose.prod.yml pull
            TAG=dev DOCKER_REGISTRY=ghcr.io/${{ steps.owner.outputs.value }} docker compose -f docker-compose.prod.yml up -d
