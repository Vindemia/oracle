services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: oracle
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: oracle
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U oracle"]
      interval: 5s
      timeout: 5s
      retries: 10

  server:
    build:
      context: packages/server
      target: dev
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: ${PORT:-3001}
      DATABASE_URL: postgresql://oracle:${DB_PASSWORD}@db:5432/oracle
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173}
    ports:
      - "${PORT:-3001}:${PORT:-3001}"
    volumes:
      - ./packages/server/src:/app/src
      - ./packages/server/prisma:/app/prisma

  client:
    build:
      context: packages/client
      target: dev
    restart: unless-stopped
    depends_on:
      - server
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:3001/api}
    ports:
      - "5173:5173"
    volumes:
      - ./packages/client/src:/app/src

volumes:
  db_data:
